train_dataset:
  dataset:
    name: paired-image-folders
    args:
      root_path_1: /data/chenni/Data1/Data1/train/gt-ob
      root_path_2: /data/chenni/Data1/Data1/train/mask-ob
      root_path_3: /data/chenni/Data1/Data1/train/normal
      vps_path: /data/chenni/vps/structured3D/train
      split_file:
      split_key: none
      cache: none
  wrapper:
    name: sr-implicit-uniform-varied
    args:
      size_min: 512
      size_max: 1024
      augment: true
  batch_size: 4

val_dataset:
  dataset:
    name: paired-image-folders
    args:
      root_path_1: /data/chenni/Data1/Data1/val/gt-ob
      root_path_2: /data/chenni/Data1/Data1/val/mask-ob
      root_path_3: /data/chenni/Data1/Data1/val/normal
      vps_path: /data/chenni/vps/structured3D/val
      split_file:
      split_key: none
      cache: none
  wrapper:
    name: sr-implicit-paired
    args:
      sample_q: 1024
      inp_size: 512
  batch_size: 1

data_norm:
  inp: {sub: [0.5], div: [0.5]}
  gt: {sub: [0.5], div: [0.5]}
  gt_rgb: {sub: [0.5], div: [0.5]}
  gt_norm: {sub: [0.5], div: [0.5]}

model:
  name: gan
  args:
    encoder_spec:
      name: coordfill
      multi_res_training: true
      mask_prediction: true
      attffc: true
      scale_injection: true
      args:
        no_upsampling: true


optimizer:
  name: adam
  args:
    lr: 1.e-4
epoch_max: 500
multi_step_lr:
  milestones: [100]
  gamma: 0.1

svs_plane_setting:
  batch_size: 4
  se_in_fusion: True
  d2n_nei: 3
  using_normloss: True
  using_disp2seg: False
  planar_thresh: 300.0
  lambda_planar_reg: 0.1
  lambda_norm_reg: 0.05
  

epoch_val: 1
epoch_save: 300

